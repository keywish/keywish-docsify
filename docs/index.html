<!doctype html>
<html>

<head>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="//unpkg.com/docsify/themes/vue.css" />
  <link rel="stylesheet" href="//unpkg.com/@sujaykumarh/docsify-plugin-footer/dist/plugin.min.css" />
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/sidebar-folder.min.css" />
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/katex@latest/dist/katex.min.css" />

</head>

<body>
  <style>
    img[src*='?logo'] {
      width: 50%;
      position: relative;
      left: 50%;
      transform: translateX(-50%);
    }

    .content img {
      max-height: 400px;
    }

    .cover img {
      width: 80%;
    }

    .markdown-section {
      max-width: 960px;
    }

    .docsify-pagination-container {
      padding: 10px 20px;
      height: auto;
    }

    code.lang-bash {
      position: relative !important;
      margin: 2.2em 5px !important;
      padding: 0 0 0 16px !important;
      overflow-y: hidden !important;
    }

    code.lang-bash::before {
      content: '$\a$\a$\a$\a$\a$\a$\a$\a$\a$\a$\a$\a$\a$\a$\a$\a$\a$\a$\a$\a$\a$\a$\a$\a$\a$\a$\a$\a$\a$\a$\a$\a$\a$\a$\a$\a$\a$\a$\a$\a$\a$\a$\a$\a$';
      position: absolute;
      left: 0;
    }

    .pagination-item-title {
      font-size: 1em;
    }
  </style>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'Keywish Docs',
      loadNavbar: true,
      loadSidebar: true,
      subMaxLevel: 4,
      autoHeader: true,
      auto2top: true,
      nativeEmoji: true,

      search: 'auto', // 默认值
      pagination: {
        previousText: {
          '/': 'PREVIOUS',
        },
        nextText: {
          '/': 'NEXT',
        },
        crossChapter: true,
        crossChapterText: true,
      },
      customPageFooter: {
        copyrightYear: '2026',
        copyrightOwnerName: 'Keywish Docs',
        copyrightOwnerLink: 'https://github.com/keywish/keywish-docsify/',
      },
      plugins: [
        function (hook, vm) {
          hook.ready(function () {
            if (vm.route.path === '/keywish-docsify/') {
              location.href = '#/en/';
            }
          });
        },
      ],
    };
  </script>
  <script src="//unpkg.com/docsify/lib/docsify.min.js"></script>
  <script src="//unpkg.com/docsify/lib/plugins/search.min.js"></script>
  <script src="//unpkg.com/docsify/lib/plugins/zoom-image.min.js"></script>
  <script src="//unpkg.com/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
  <script src="//unpkg.com/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <script src="//unpkg.com/docsify-pangu/lib/pangu.min.js"></script>
  <script src="//unpkg.com/docsify-bilibili/bilibili.min.js"></script>
  <script src="//unpkg.com/docsify-footnote/dist/docsify-footnote.min.js"></script>
  <script src="//unpkg.com/@h-hg/docsify-image-caption/dist/docsify-image-caption.min.js"></script>
  <script src="//unpkg.com/@sujaykumarh/docsify-plugin-footer/dist/plugin.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/docsify-sidebar-collapse.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@latest/dist/katex.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-latex@0"></script>
</body>

</html>
